
version: '3.8'
services:
  backend:
    build:
      context: ../src/backend
      dockerfile: ../../containers/Dockerfile.backend
    container_name: cpdlc-backend
    restart: unless-stopped
    env_file:
      - ../config/environment_vars/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - cpdlc-net

  frontend:
    build:
      context: ../src/frontend
      dockerfile: ../../containers/Dockerfile.frontend
    container_name: cpdlc-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - cpdlc-net

  mongo:
    image: mongo:6.0
    container_name: cpdlc-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cpdlc-net

volumes:
  mongo-data:

networks:
  cpdlc-net:
    driver: bridge
