<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPDLC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">CPDLC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="#messages-section" id="nav-messages">
                                Messages
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#history-section" id="nav-history">
                                History
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#settings-section" id="nav-settings">
                                Settings
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#airspace-section" id="nav-airspace">
                                Airspace
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <!-- Messages Section -->
                <section id="messages-section" class="active-section">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    Current Messages
                                </div>
                                <ul class="list-group list-group-flush" id="message-list">
                                </ul>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    New Message
                                </div>
                                <div class="card-body">
                                    <form id="message-input-form">
                                        <div class="mb-3">
                                            <label for="message-type" class="form-label">Message Type:</label>
                                            <select id="message-type" name="type" class="form-select" required>
                                                <option value="" disabled selected>Select message type</option>
                                                <option value="weather">Weather</option>
                                                <option value="clearance">Clearance</option>
                                                <option value="emergency">Emergency</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label for="recipient" class="form-label">Recipient:</label>
                                            <input type="text" id="recipient" name="recipient" class="form-control" placeholder="Enter recipient" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="message-content" class="form-label">Message Text:</label>
                                            <textarea id="message-content" name="content" rows="4" class="form-control" placeholder="Enter your message" required></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-primary">Send Message</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Message History Section -->
                <section id="history-section">
                    <div class="card">
                        <div class="card-header">
                            Message History
                        </div>
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th scope="col">#</th>
                                        <th scope="col">From</th>
                                        <th scope="col">To</th>
                                        <th scope="col">Message</th>
                                        <th scope="col">Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="message-history-content">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Settings Panel -->
                <section id="settings-section">
                    <div class="card">
                        <div class="card-header">
                            Settings
                        </div>
                        <div class="card-body">
                            <form id="settings-form">
                                <div class="mb-3">
                                    <label for="volume" class="form-label">Volume:</label>
                                    <input type="range" class="form-range" min="0" max="100" value="75" id="volume">
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="notifications" checked>
                                    <label class="form-check-label" for="notifications">Enable Notifications</label>
                                </div>
                                <div class="mb-3">
                                    <label for="theme-select" class="form-label">Theme:</label>
                                    <select id="theme-select" class="form-select">
                                        <option value="light">Light Theme</option>
                                        <option value="dark">Dark Theme</option>
                                        <option value="high-contrast">Sepia Theme</option>
                                    </select>
                                </div>
                                <button type="button" id="save-settings" class="btn btn-primary">Save Settings</button>
                            </form>
                        </div>
                    </div>
                </section>

                <!-- Airspace Section -->
                <section id="airspace-section">
                    <div class="card">
                        <div class="card-header">
                            Airspace
                        </div>
                        <div class="card-body">
                            <div id="map" style="height: 500px;"></div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="main.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
