<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPDLC | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>

<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand mb-4">
                <h3 class="fw-bold m-0"
                    style="background: linear-gradient(135deg, #3b82f6, #6366f1); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    CPDLC</h3>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-nav-item">
                    <a href="#messages-section" class="sidebar-nav-link active" id="nav-messages">
                        <i class="bi bi-chat-dots me-2"></i> Messages
                    </a>
                </div>
                <div class="sidebar-nav-item">
                    <a href="#history-section" class="sidebar-nav-link" id="nav-history">
                        <i class="bi bi-clock-history me-2"></i> History
                    </a>
                </div>
                <div class="sidebar-nav-item">
                    <a href="#airspace-section" class="sidebar-nav-link" id="nav-airspace">
                        <i class="bi bi-map me-2"></i> Airspace
                    </a>
                </div>
                <div class="sidebar-nav-item">
                    <a href="#settings-section" class="sidebar-nav-link" id="nav-settings">
                        <i class="bi bi-gear me-2"></i> Settings
                    </a>
                </div>
            </nav>
            <div class="mt-auto">
                <div class="glass-card p-3 d-flex align-items-center">
                    <div class="rounded-circle bg-primary me-2" style="width: 32px; height: 32px;"></div>
                    <div class="small overflow-hidden">
                        <div class="fw-bold text-truncate" id="user-display">Pilot User</div>
                        <div class="text-secondary smaller">Online</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Messages Section -->
            <section id="messages-section" class="active-section">
                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <span>COMMUNICATIONS</span>
                                <span class="badge bg-primary">LIVE</span>
                            </div>
                            <div class="card-body p-0">
                                <ul class="list-group list-group-flush bg-transparent" id="message-list">
                                    <!-- Messages will be injected here -->
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <div class="card">
                            <div class="card-header">NEW UPLINK</div>
                            <div class="card-body">
                                <form id="message-input-form">
                                    <div class="mb-3">
                                        <label class="form-label smaller text-secondary">TYPE</label>
                                        <select id="message-type" name="type"
                                            class="form-select bg-dark border-secondary text-white" required>
                                            <option value="clearance">Clearance</option>
                                            <option value="weather">Weather</option>
                                            <option value="emergency">Emergency</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label smaller text-secondary">RECIPIENT</label>
                                        <input type="text" id="recipient" name="recipient"
                                            class="form-control bg-dark border-secondary text-white"
                                            placeholder="Callsign..." required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label smaller text-secondary">CONTENT</label>
                                        <textarea id="message-content" name="content" rows="4"
                                            class="form-control bg-dark border-secondary text-white"
                                            placeholder="Message content..." required></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-premium w-100">SEND MESSAGE</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Section -->
            <section id="history-section">
                <div class="card">
                    <div class="card-header">MESSAGE LOGS</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover m-0">
                                <thead>
                                    <tr>
                                        <th>FROM</th>
                                        <th>TO</th>
                                        <th>MESSAGE</th>
                                        <th>TIMESTAMP</th>
                                    </tr>
                                </thead>
                                <tbody id="message-history-content">
                                    <!-- History injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Airspace Section -->
            <section id="airspace-section">
                <div class="card overflow-hidden">
                    <div class="card-header">RADAR DISPLAY</div>
                    <div class="card-body p-0">
                        <div id="map" style="height: calc(100vh - 180px); min-height: 500px;"></div>
                    </div>
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings-section">
                <div class="card" style="max-width: 600px;">
                    <div class="card-header">CONFIGURATIONS</div>
                    <div class="card-body">
                        <form id="settings-form">
                            <div class="mb-4">
                                <label class="form-label">Alert Volume</label>
                                <input type="range" class="form-range" min="0" max="100" value="75" id="volume">
                            </div>
                            <div class="mb-4 form-check form-switch">
                                <input type="checkbox" class="form-check-input" id="notifications" checked>
                                <label class="form-check-label" for="notifications">Desktop Notifications</label>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Visual Interface</label>
                                <select id="theme-select" class="form-select bg-dark border-secondary text-white">
                                    <option value="dark">Dark Matrix (Default)</option>
                                    <option value="light">Light Fusion</option>
                                </select>
                            </div>
                            <button type="button" id="save-settings" class="btn btn-premium">Apply Changes</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- External Deps -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="main.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
