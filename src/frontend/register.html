<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPDLC | Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/auth.css">
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>CPDLC</h1>
            <p>Create your account for mission control</p>
        </div>
        <div class="error-msg" id="error-message"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username / Callsign</label>
                <input type="text" id="username" class="form-control" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label for="role">Mission Role</label>
                <select id="role" class="form-control">
                    <option value="pilot">Pilot</option>
                    <option value="atc">Air Traffic Controller</option>
                </select>
            </div>
            <button type="submit" class="btn-auth" id="register-btn">REGISTER</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    <script src="register.bundle.js"></script>
</body>

</html>
