<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPDLC | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/auth.css">
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>CPDLC</h1>
            <p>Enter your credentials to access mission control</p>
        </div>
        <div class="error-msg" id="error-message"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username / Callsign</label>
                <input type="text" id="username" class="form-control" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-auth" id="login-btn">LOG IN</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
    <script src="login.bundle.js"></script>
</body>

</html>
